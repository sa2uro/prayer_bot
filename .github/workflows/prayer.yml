name: Twitch Prayer Reminder Bot

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          npm install node-fetch@2 tmi.js

      - name: Run Prayer Bot Script
        env:
          TWITCH_OAUTH_TOKEN: ${{ secrets.TWITCH_OAUTH_TOKEN }}
          TWITCH_CHANNEL: '#sa2uro'
        run: node bot.js
