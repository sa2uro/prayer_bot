name: Automated Prayer Bot

on:
  schedule:
    # تشغيل الأكشن كل 15 دقيقة بشكل دوري وآمن تماماً
    - cron: '*/15 * * * *'
  workflow_dispatch: 

jobs:
  get-prayer-times:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install tmi.js node-fetch@2

      - name: Fetch and Schedule Prayers
        env:
          TWITCH_OAUTH_TOKEN: ${{ secrets.TWITCH_OAUTH_TOKEN }}
          TWITCH_CHANNEL: "#sa2uro"
        run: |
          node bot.js
