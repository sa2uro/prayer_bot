Name: Test Prayer Bot Continuous

on:
  schedule:
    # سيتم تشغيل السيرفر تلقائياً كل 6 ساعات بدقة لضمان الاستمرارية التامة بدون تداخل
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install node-fetch@2 tmi.js

      - name: Run test bot
        run: node test-bot.js
        env:
          TWITCH_CHANNEL: ${{ secrets.TWITCH_CHANNEL }}
          TWITCH_OAUTH_TOKEN: ${{ secrets.TWITCH_OAUTH_TOKEN }}
